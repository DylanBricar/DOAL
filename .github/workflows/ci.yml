name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test ./... -count=1 -timeout=120s -race -coverprofile=coverage.out

      - name: Coverage report
        run: go tool cover -func=coverage.out | tail -1

      - name: Build
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o doal .
          ls -lh doal
